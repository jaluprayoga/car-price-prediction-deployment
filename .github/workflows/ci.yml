name: API Deployment Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Go 1.23
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Install ONNX Runtime C library
      run: |
        wget -q https://github.com/microsoft/onnxruntime/releases/download/v1.18.1/onnxruntime-linux-x64-1.18.1.tgz
        tar -xzf onnxruntime-linux-x64-1.18.1.tgz
        sudo cp onnxruntime-linux-x64-1.18.1/lib/libonnxruntime.so.1.18.1 /usr/local/lib/
        sudo ln -s /usr/local/lib/libonnxruntime.so.1.18.1 /usr/local/lib/libonnxruntime.so
        sudo ldconfig

    - name: Run Go Tests
      env:
        ONNXRUNTIME_SHARED_LIB_PATH: /usr/local/lib/libonnxruntime.so
        JWT_SECRET_KEY: testsecretkey12345678901234567890123456789012
        API_KEYS: test-api-key-12345
      run: |
        go test -v ./...

    - name: Build API Docker Image
      run: |
        docker build -t car-price-api:latest -f Dockerfile .
